    description: ScanSource Sales Order API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: salesorder-cancel
      path: /salesorder/cancel
      operations:
      - name: cancelsalesorder
        method: DELETE
        description: Cancel Sales Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: salesorder-create
      path: /salesorder/create
      operations:
      - name: createsalesorder
        method: POST
        description: Create Sales Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerNumber
          in: query
          type: string
          description: Customer account number
          required: true
        - name: requestor
          in: query
          type: string
          description: Identifier of the requestor
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: salesorder-createAsync
      path: /salesorder/createAsync
      operations:
      - name: createsalesorderasync
        method: POST
        description: Create Sales Order Async
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: salesorder-detail-customerNumber-salesOrderNumber
      path: /salesorder/detail/{customerNumber}/{salesOrderNumber}
      operations:
      - name: getsalesorderdetail
        method: GET
        description: Get Sales Order Detail
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerNumber
          in: path
          type: string
          description: Customer account number
          required: true
        - name: salesOrderNumber
          in: path
          type: string
          description: ScanSource sales order number
          required: true
    - name: salesorder-list-customerNumber
      path: /salesorder/list/{customerNumber}
      operations:
      - name: listsalesorders
        method: GET
        description: List Sales Orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerNumber
          in: path
          type: string
          description: Customer account number
          required: true
        - name: page
          in: query
          type: integer
        - name: pageSize
          in: query
          type: integer
        - name: salesOrderNumber
          in: query
          type: string
        - name: poNumber
          in: query
          type: string
        - name: fromDate
          in: query
          type: string
        - name: toDate
          in: query
          type: string
    - name: salesorder-summary-customerNumber
      path: /salesorder/summary/{customerNumber}
      operations:
      - name: getsalesordersummary
        method: GET
        description: Get Sales Order Summary
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerNumber
          in: path
          type: string
          description: Customer account number
          required: true
        - name: page
          in: query
          type: integer
          description: Page number
        - name: pageSize
          in: query
          type: integer
          description: Results per page
        - name: salesOrderNumber
          in: query
          type: string
          description: Filter by ScanSource sales order number
        - name: invoiceNumber
          in: query
          type: string
          description: Filter by invoice number
        - name: poNumber
          in: query
          type: string
          description: Filter by customer purchase order number
        - name: fromDate
          in: query
          type: string
          description: Start date filter (ISO 8601)
        - name: toDate
          in: query
          type: string
          description: End date filter (ISO 8601)
    - name: salesorder-vrd
      path: /salesorder/vrd
      operations:
      - name: createvrdorder
        method: POST
        description: Create VRD Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerNumber
          in: query
          type: string
          description: Customer account number
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Ocp-Apim-Subscription-Key
      value: '{{env.SCANSOURCE_API_KEY}}'
      placement: header
  exposes:
