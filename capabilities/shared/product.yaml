naftiko: "1.0.0-alpha1"

info:
  label: "ScanSource Product API"
  description: "Real-time product search, pricing, and availability for ScanSource technology distribution partners."
  tags:
  - ScanSource
  - Products
  - Pricing
  - Availability
  - Distribution
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
- namespace: env
  keys:
    SCANSOURCE_API_KEY: SCANSOURCE_API_KEY

capability:
  consumes:
  - type: http
    namespace: scansource-product
    baseUri: https://services.scansource.com/api
    description: "ScanSource Product API for real-time inventory, pricing, and product data."
    authentication:
      type: apikey
      key: Ocp-Apim-Subscription-Key
      value: "{{SCANSOURCE_API_KEY}}"
      placement: header
    resources:
    - name: products
      path: /product
      description: "Product catalog search and detail operations"
      operations:
      - name: search-products
        method: GET
        description: "Search for products in the ScanSource catalog"
        inputParameters:
        - name: customerNumber
          in: query
          type: string
          required: true
          description: "Customer account number"
        - name: searchText
          in: query
          type: string
          required: false
          description: "Free-text search string"
        - name: manufacturer
          in: query
          type: string
          required: false
          description: "Filter by manufacturer"
        - name: page
          in: query
          type: integer
          required: false
          description: "Page number"
        - name: pageSize
          in: query
          type: integer
          required: false
          description: "Results per page"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: "$."
      - name: get-product-detail
        method: GET
        description: "Retrieve detailed product information"
        inputParameters:
        - name: customerNumber
          in: query
          type: string
          required: true
          description: "Customer account number"
        - name: itemNumber
          in: query
          type: string
          required: true
          description: "Item number"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: "$."
    - name: pricing
      path: /product/pricing
      description: "Real-time product pricing"
      operations:
      - name: get-product-pricing
        method: POST
        description: "Get real-time pricing for up to 40 products"
        inputParameters:
        - name: customerNumber
          in: query
          type: string
          required: true
          description: "Customer account number"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: "$."
        body:
          type: json
          data:
            items: "{{tools.items}}"
    - name: availability
      path: /product/availability
      description: "Real-time inventory availability"
      operations:
      - name: get-product-availability
        method: POST
        description: "Check real-time availability for up to 40 products"
        inputParameters:
        - name: customerNumber
          in: query
          type: string
          required: false
          description: "Customer account number"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: "$."
        body:
          type: json
          data:
            items: "{{tools.items}}"

  exposes:
  - type: rest
    port: 8100
    namespace: scansource-product-api
    resources:
    - path: /v1/products
      name: products
      description: "Product search and catalog"
      operations:
      - method: GET
        name: search-products
        description: "Search for products"
        call: "scansource-product.search-products"
        with:
          customerNumber: "rest.customerNumber"
          searchText: "rest.searchText"
        outputParameters:
        - type: object
          mapping: "$."
    - path: /v1/products/{itemNumber}
      name: product-detail
      description: "Product detail"
      operations:
      - method: GET
        name: get-product-detail
        description: "Get product detail"
        call: "scansource-product.get-product-detail"
        with:
          customerNumber: "rest.customerNumber"
          itemNumber: "rest.itemNumber"
        outputParameters:
        - type: object
          mapping: "$."
    - path: /v1/pricing
      name: pricing
      description: "Product pricing"
      operations:
      - method: POST
        name: get-product-pricing
        description: "Get pricing for products"
        call: "scansource-product.get-product-pricing"
        with:
          items: "rest.items"
        outputParameters:
        - type: object
          mapping: "$."
    - path: /v1/availability
      name: availability
      description: "Product availability"
      operations:
      - method: POST
        name: get-product-availability
        description: "Check availability for products"
        call: "scansource-product.get-product-availability"
        with:
          items: "rest.items"
        outputParameters:
        - type: object
          mapping: "$."

  - type: mcp
    port: 9100
    namespace: scansource-product-mcp
    transport: http
    tools:
    - name: search-products
      description: "Search for products in the ScanSource catalog"
      hints:
        readOnly: true
        openWorld: true
      call: "scansource-product.search-products"
      with:
        customerNumber: "tools.customerNumber"
        searchText: "tools.searchText"
      outputParameters:
      - type: object
        mapping: "$."
    - name: get-product-detail
      description: "Get detailed information for a specific product"
      hints:
        readOnly: true
        openWorld: true
      call: "scansource-product.get-product-detail"
      with:
        customerNumber: "tools.customerNumber"
        itemNumber: "tools.itemNumber"
      outputParameters:
      - type: object
        mapping: "$."
    - name: get-product-pricing
      description: "Get real-time pricing for up to 40 products"
      hints:
        readOnly: true
        openWorld: true
      call: "scansource-product.get-product-pricing"
      with:
        items: "tools.items"
      outputParameters:
      - type: object
        mapping: "$."
    - name: get-product-availability
      description: "Check real-time inventory availability for up to 40 products"
      hints:
        readOnly: true
        openWorld: true
      call: "scansource-product.get-product-availability"
      with:
        items: "tools.items"
      outputParameters:
      - type: object
        mapping: "$."
