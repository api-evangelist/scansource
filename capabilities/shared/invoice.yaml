naftiko: "1.0.0-alpha1"

info:
  label: "ScanSource Invoice API"
  description: "Invoice retrieval, filtering, and PDF export for ScanSource distribution partners."
  tags:
  - ScanSource
  - Invoices
  - Billing
  - Finance
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
- namespace: env
  keys:
    SCANSOURCE_API_KEY: SCANSOURCE_API_KEY

capability:
  consumes:
  - type: http
    namespace: scansource-invoice
    baseUri: https://services.scansource.com/api
    description: "ScanSource Invoice API for billing and financial record access."
    authentication:
      type: apikey
      key: Ocp-Apim-Subscription-Key
      value: "{{SCANSOURCE_API_KEY}}"
      placement: header
    resources:
    - name: invoices
      path: /invoice
      description: "Invoice retrieval and management"
      operations:
      - name: get-invoice-summary
        method: GET
        description: "Get paginated invoice summary for a customer"
        inputParameters:
        - name: customerNumber
          in: path
          type: string
          required: true
          description: "Customer account number"
        - name: fromDate
          in: query
          type: string
          required: false
          description: "Start date filter"
        - name: toDate
          in: query
          type: string
          required: false
          description: "End date filter"
        - name: page
          in: query
          type: integer
          required: false
          description: "Page number"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: "$."
      - name: list-invoices
        method: GET
        description: "Get detailed invoice list for a customer"
        inputParameters:
        - name: customerNumber
          in: path
          type: string
          required: true
          description: "Customer account number"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: "$."
      - name: get-invoice-detail
        method: GET
        description: "Get comprehensive details for a specific invoice"
        inputParameters:
        - name: customerNumber
          in: path
          type: string
          required: true
          description: "Customer account number"
        - name: invoiceNumber
          in: path
          type: string
          required: true
          description: "Invoice number"
        - name: excludeSerialTracking
          in: query
          type: boolean
          required: false
          description: "Exclude serial tracking data"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: "$."
      - name: get-invoice-pdf
        method: GET
        description: "Download a PDF copy of an invoice"
        inputParameters:
        - name: customerNumber
          in: path
          type: string
          required: true
          description: "Customer account number"
        - name: invoiceNumber
          in: path
          type: string
          required: true
          description: "Invoice number"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: "$."

  exposes:
  - type: rest
    port: 8102
    namespace: scansource-invoices-api
    resources:
    - path: /v1/invoices
      name: invoices
      description: "Invoice management"
      operations:
      - method: GET
        name: get-invoice-summary
        description: "Get invoice summary"
        call: "scansource-invoice.get-invoice-summary"
        outputParameters:
        - type: object
          mapping: "$."
    - path: /v1/invoices/{invoiceNumber}
      name: invoice-detail
      description: "Invoice detail"
      operations:
      - method: GET
        name: get-invoice-detail
        description: "Get invoice detail"
        call: "scansource-invoice.get-invoice-detail"
        outputParameters:
        - type: object
          mapping: "$."
    - path: /v1/invoices/{invoiceNumber}/pdf
      name: invoice-pdf
      description: "Invoice PDF"
      operations:
      - method: GET
        name: get-invoice-pdf
        description: "Download invoice PDF"
        call: "scansource-invoice.get-invoice-pdf"
        outputParameters:
        - type: object
          mapping: "$."

  - type: mcp
    port: 9102
    namespace: scansource-invoices-mcp
    transport: http
    tools:
    - name: get-invoice-summary
      description: "Get a summary of invoices for a customer with date filtering"
      hints:
        readOnly: true
        openWorld: true
      call: "scansource-invoice.get-invoice-summary"
      outputParameters:
      - type: object
        mapping: "$."
    - name: get-invoice-detail
      description: "Get comprehensive details for a specific invoice including line items"
      hints:
        readOnly: true
        openWorld: true
      call: "scansource-invoice.get-invoice-detail"
      outputParameters:
      - type: object
        mapping: "$."
    - name: get-invoice-pdf
      description: "Download a PDF copy of an invoice"
      hints:
        readOnly: true
        openWorld: true
      call: "scansource-invoice.get-invoice-pdf"
      outputParameters:
      - type: object
        mapping: "$."
