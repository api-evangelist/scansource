principles:
- name: Visibility
  description: Consumption visibility comes from the ScanSource account / partner reporting surface (invoices,
    account dashboards) rather than a public usage API.
- name: Allocation
  description: Allocate cost through the ScanSource contract structure (entitlement, project, business
    unit) and reconcile against internal cost centers.
- name: Optimization
  description: 'Optimization levers are commercial: renegotiation cadence, commitment sizing, and consolidation
    of ScanSource entitlements.'
- name: Accountability
  description: Assign a contract owner who reconciles ScanSource invoices against contracted entitlements
    each billing cycle.
