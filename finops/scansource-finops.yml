description: 'FOCUS-aligned FinOps shape for ScanSource: B2B distributor APIs (product, pricing, inventory,
  orders) provided to channel partners under their existing partner agreement. No standalone API fee;
  consumption is operational support to the distribution relationship.'
notes: ScanSource is a B2B technology distributor; its Product API is provisioned for authorized channel
  partners under a partner agreement. There is no self-service pricing page or public plan tier, and access
  requires a ScanSource partner account.
