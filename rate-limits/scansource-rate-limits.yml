specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: ScanSource
providerId: scansource
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
- Distribution
- B2B
- Rate Limiting
description: ScanSource does not publish public API rate limits reachable in this reconciliation pass;
  limits are governed by the customer's commercial / partner agreement. Consumers should honor 429 / 503
  responses where they appear and follow standard exponential-backoff guidance.
notes: ScanSource is a B2B technology distributor; its Product API is provisioned for authorized channel
  partners under a partner agreement. There is no self-service pricing page or public plan tier, and access
  requires a ScanSource partner account.
sources:
- https://www.scansource.com/
- https://services.scansource.com/api/Help
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
- name: Contracted limits
  scope: account
  metric: varies
  limit: negotiated under commercial / partner agreement; not publicly published
policies:
- name: Backoff on 429
  description: Clients should implement exponential backoff with jitter on HTTP 429 responses, honoring
    the Retry-After header when present.
- name: Quota raise via account team
  description: Quota and rate-limit changes are coordinated through the ScanSource account team or partner
    manager rather than self-service.
maintainers:
